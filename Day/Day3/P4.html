<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video tag</title>
</head>
<body>
    <p> Video tag</p>
    <!--  -->
    <video src="sample-5s-360p (2).mp4" controls>
        Your browser does not support the video tag.
    </video>
    <video src="sample-5s-360p (1).webm" controls autoplay muted loop>
        Your browser does not support the video tag.
     <!-- W/o controls the video appears but the user cannot play it. 
     JavaScript can start playing the video -->

    <!-- Width & Height  -->
    <video src="sample-5s-360p(2).mp4" width="880" height="520" controls>
        Your browser does not support the video tag
    </video>

    <!-- autoplay -->
    <video src="sample-5s-360p(2).mp4" width="880" height="520" autoplay controls>
        Your browser does not support the video tag
    </video>
     <!-- muted -->
    <video src="sample-5s-360p(2).mp4" width="880" height="520" autoplay muted controls>
        Your browser does not support the video tag
    </video>

    <!-- loop -->
     <video src="sample-5s-360p.mp4" width="880" height="520" loop autoplay controls>
        Your browser does not support the video tag
    </video>

    <!-- poster -->
    <video src="sample-5s-360p(2).mp4" width="880" height="520" poster="video(1).png" muted autoplay controls>
        Your browser does not support the video tag
    </video>

    <!-- Preload -->
    <!-- none: Don't preload; load only when user starts playing -->
    <!-- metadata: Load only information like duration, dimensions etc -->
    <!-- auto: Automatic: Browser load video immediately -->
    <video src="sample-5s-360p(2).mp4" width="880" height="520" poster="video(1).png" muted 
     preload="none" controls>
        Your browser does not support the video tag
    </video>

</body>
</html>
